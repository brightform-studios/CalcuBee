<body>
    <header class="site-header" aria-label="Site header">

    <main class="shell" aria-label="Calculator app">
        <aside class="history-panel panel">

            <ul id="historyList" class="history-list" aria-label="Recent calculations"></ul>

        <section class="center-column" aria-label="Calculator and sticky notes">
            <section class="calculator panel" aria-labelledby="title">
                <div class="headline">
                    <h1 id="title">CalcuBee</h1>

                <div class="display">
                    <input id="expression" class="expression" type="text" inputmode="text"

                    <div id="result" class="result" aria-live="polite">0</div>
                </div>
                <div class="grid" id="keys">
                    <button class="op" data-action="clear">ac</button>
                    <button class="op" data-action="delete">del</button>
                    <button class="op" data-action="ans">ans</button>
                    <button class="op" data-action="ee">EE</button>
                    <button class="op" data-value="(">(</button>
                    <button class="op" data-value=")">)</button>

                    <button class="op" data-value="sin(">sin</button>
                    <button class="op" data-value="cos(">cos</button>
                    <button class="op" data-value="tan(">tan</button>
                    <button class="op" data-value="asin(">asin</button>

    <script src="https://cdn.jsdelivr.net/npm/mathjs@12.4.2/lib/browser/math.js"></script>
    <script>
        // --- DOM Elements ---
        const expressionInput = document.getElementById("expression");
        const resultOutput = document.getElementById("result");
        const keys = document.getElementById("keys");
        const canvas = document.getElementById("whiteboard");
        const clearBoardBtn = document.getElementById("clearBoard");
        const eraserBtn = document.getElementById("eraserBtn");
        const pencilBtn = document.getElementById("pencilBtn");
        const lineBtn = document.getElementById("lineBtn");
        const circleBtn = document.getElementById("circleBtn");
        const squareBtn = document.getElementById("squareBtn");
        const triangleBtn = document.getElementById("triangleBtn");
        const penColor = document.getElementById("penColor");
        const penSize = document.getElementById("penSize");
        const historyList = document.getElementById("historyList");
        const addStickyBtn = document.getElementById("addStickyBtn");
        const notesSpace = document.querySelector(".notes-space");
        const stickyLayer = document.getElementById("stickyLayer");
        const noteSlots = Array.from(document.querySelectorAll(".note-slot"));
        const siteFooter = document.querySelector(".site-footer");
        const headerAvatar = document.getElementById("headerAvatar");
        const authBtn = document.getElementById("authBtn");
        const ctx = canvas.getContext("2d");

        if (stickyLayer.parentElement !== document.body) {
            document.body.appendChild(stickyLayer);
        }

        // --- Calculator Scope ---
        const scope = {
            ans: 0,
            inv: (x) => 1 / x,
            nCr: (n, r) => math.combinations(n, r),
            nPr: (n, r) => math.permutations(n, r)
        };

        let stickyCounter = 0;
        let activeDrag = null;
        let drawing = false;
        let erasing = false;
        let lineMode = false;
        let shapeMode = null; // 'circle' | 'square' | 'triangle' | null
        let lineStart = null;
        let lineSnapshot = null;
        let currentUser = null;
        let firestoreUnsubscribe = null;
        let shouldReloadAfterSignOut = false;
        const WHITEBOARD_STORAGE_KEY = 'whiteboardImage';
        const CALC_HISTORY_STORAGE_KEY = 'calcHistory';

        // --- Sticky Notes Local Storage ---
        function debounce(fn, delay) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
        }

        function collectStickyNotes() {
            return Array.from(stickyLayer.querySelectorAll('.sticky-note')).map(note => {
                const textarea = note.querySelector('.sticky-input');
                return {
                    id: note.dataset.noteId,
                    slot: note.dataset.attachedSlot ?? "",
                    x: parseFloat(note.style.left || '0'),
                    y: parseFloat(note.style.top || '0'),
                    value: textarea ? textarea.value : ""
                };
            });
        }

        function writeStickyNotesToFirestoreNow() {
            if (!currentUser) return Promise.resolve();
            return db.collection("users").doc(currentUser.uid)
                .set({ stickyNotes: collectStickyNotes() }, { merge: true });
        }

        function collectCalcHistory() {
            return Array.from(historyList.querySelectorAll("li")).map(li => ({
                exp: li.querySelector(".item-exp")?.textContent || "",
                res: li.querySelector(".item-res")?.textContent || ""
            }));
        }

        function writeHistoryToFirestoreNow() {
            if (!currentUser) return Promise.resolve();
            return db.collection("users").doc(currentUser.uid)
                .set({ calcHistory: collectCalcHistory() }, { merge: true });
        }

        function createHistoryItem(expression, result) {
            const item = document.createElement("li");
            const exp = document.createElement("span");
            const res = document.createElement("span");
            const removeBtn = document.createElement("button");
            exp.className = "item-exp";
            res.className = "item-res";
            removeBtn.className = "history-remove";
            removeBtn.type = "button";
            removeBtn.setAttribute("aria-label", "Remove calculation");
            removeBtn.textContent = "x";
            exp.textContent = expression || "";
            res.textContent = result || "";
            item.appendChild(exp);
            item.appendChild(res);
            item.appendChild(removeBtn);
            return item;
        }

        function renderCalcHistory(items) {
            historyList.innerHTML = "";
            if (!Array.isArray(items)) return;
            items.forEach(item => {
                historyList.appendChild(createHistoryItem(item?.exp || "", item?.res || ""));
            });
        }

        function loadHistoryFromLocalStorage() {
            const items = JSON.parse(localStorage.getItem(CALC_HISTORY_STORAGE_KEY) || '[]');
            renderCalcHistory(items);
        }

        function getWhiteboardDataUrl() {
            return canvas.toDataURL('image/png');
        }

        function drawWhiteboardFromDataUrl(dataUrl) {
            fillBoardBackground();
            if (!dataUrl) return;
            const image = new Image();
            image.onload = () => {
                ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            };
            image.src = dataUrl;
        }

        function loadWhiteboardFromLocalStorage() {
            const dataUrl = localStorage.getItem(WHITEBOARD_STORAGE_KEY) || "";
            drawWhiteboardFromDataUrl(dataUrl);
        }

        function writeWhiteboardToFirestoreNow() {
            if (!currentUser) return Promise.resolve();
            return db.collection("users").doc(currentUser.uid)
                .set({ whiteboardImage: getWhiteboardDataUrl() }, { merge: true });
        }

        const saveWhiteboardToFirestore = debounce(() => {
            if (!currentUser) return;
            writeWhiteboardToFirestoreNow().catch(err => console.error("Firestore write failed:", err));
        }, 800);

        function saveWhiteboard() {
            const dataUrl = getWhiteboardDataUrl();
            localStorage.setItem(WHITEBOARD_STORAGE_KEY, dataUrl);
            saveWhiteboardToFirestore();
        }

        const saveNotesToFirestore = debounce(() => {
            if (!currentUser) return;
            writeStickyNotesToFirestoreNow().catch(err => console.error("Firestore write failed:", err));
        }, 800);
        function saveHistoryToFirestore() {
            const items = collectCalcHistory();
            localStorage.setItem(CALC_HISTORY_STORAGE_KEY, JSON.stringify(items));
            if (!currentUser) return;
            writeHistoryToFirestoreNow().catch(err => console.error("Firestore write failed:", err));
        }
        // Persist note data so notes survive page reloads.
        function saveStickyNotes() {
            const notes = Array.from(stickyLayer.querySelectorAll('.sticky-note')).map(note => {
                const textarea = note.querySelector('.sticky-input');
                return {
                    id: note.dataset.noteId,
                    slot: note.dataset.attachedSlot,
                    x: parseFloat(note.style.left || '0'),
                    y: parseFloat(note.style.top || '0'),
                    value: textarea ? textarea.value : ""
                };
            });
            localStorage.setItem('stickyNotes', JSON.stringify(notes));
            saveNotesToFirestore();
        }
        // Restore notes and reattach per-note input listeners after loading.
        function loadStickyNotes() {
            const notes = JSON.parse(localStorage.getItem('stickyNotes') || '[]');
            syncStickyLayerBounds();
            notes.forEach(noteData => {
                const note = document.createElement('article');
                note.className = 'sticky-note color-yellow';
                note.dataset.noteId = noteData.id;
                if (noteData.slot !== undefined && noteData.slot !== "") {
                    note.dataset.attachedSlot = noteData.slot;
                }
                note.style.zIndex = String(20 + stickyCounter);
                note.innerHTML = `
                    <div class="sticky-drag-zone" aria-hidden="true"></div>
                    <button class="sticky-remove" type="button" aria-label="Remove sticky note">x</button>
                    <textarea class="sticky-input" placeholder="Write your note..."></textarea>
                `;
                stickyLayer.appendChild(note);
                const noteNumber = Number.parseInt(String(noteData.id).replace(/^sticky-/, ''), 10);
                if (Number.isFinite(noteNumber)) stickyCounter = Math.max(stickyCounter, noteNumber);

                const slot = noteSlots.find(s => s.dataset.slotIndex === noteData.slot && !s.dataset.noteId);
                if (slot) {
                    slot.dataset.noteId = noteData.id;
                    positionNoteOnSlot(note, slot);
                } else if (Number.isFinite(noteData.x) && Number.isFinite(noteData.y)) {
                    setClampedNotePosition(note, noteData.x, noteData.y);
                } else {
                    const fallbackSlot = getOpenSlot();
                    if (fallbackSlot) {
                        fallbackSlot.dataset.noteId = noteData.id;
                        note.dataset.attachedSlot = fallbackSlot.dataset.slotIndex;
                        positionNoteOnSlot(note, fallbackSlot);
                    } else {
                        setClampedNotePosition(note, 8, 8);
                    }
                }

                const textarea = note.querySelector('.sticky-input');
                if (textarea) textarea.value = noteData.value;
                note.querySelector('.sticky-input').addEventListener('input', saveStickyNotes);
            });
        }
        window.addEventListener('DOMContentLoaded', loadStickyNotes);

        // --- Sticky Note Logic ---
        // Slot helpers keep note placement deterministic and easy to snap back.
        function getSlotRect(slot) { return slot.getBoundingClientRect(); }
        function getLayerRect() { return stickyLayer.getBoundingClientRect(); }
        function getLayerPageOffset() {
            const layerRect = getLayerRect();
            return {
                left: layerRect.left + window.scrollX,
                top: layerRect.top + window.scrollY
            };
        }
        function syncStickyLayerBounds() {
            const footerBottom = siteFooter
                ? Math.ceil(siteFooter.getBoundingClientRect().bottom + window.scrollY)
                : 0;
            const viewportBottom = Math.ceil(window.scrollY + window.innerHeight);
            stickyLayer.style.height = `${Math.max(footerBottom, viewportBottom)}px`;
        }
        function clamp(value, min, max) {
            return Math.max(min, Math.min(value, max));
        }
        function getStickyBounds(note) {
            syncStickyLayerBounds();
            const safeGap = 8;
            const siteHeader = document.querySelector('.site-header');
            const headerBottom = siteHeader
                ? Math.ceil(siteHeader.getBoundingClientRect().bottom + window.scrollY)
                : 0;
            const footerTop = siteFooter
                ? Math.floor(siteFooter.getBoundingClientRect().top + window.scrollY)
                : stickyLayer.offsetHeight;
            const maxX = Math.max(safeGap, window.innerWidth - note.offsetWidth - safeGap);
            const minY = headerBottom + safeGap;
            const maxY = Math.max(minY, footerTop - note.offsetHeight - safeGap);

            return {
                minX: safeGap,
                maxX,
                minY,
                maxY
            };
        }
        function setClampedNotePosition(note, x, y) {
            const bounds = getStickyBounds(note);
            const nextX = clamp(x, bounds.minX, bounds.maxX);
            const nextY = clamp(y, bounds.minY, bounds.maxY);
            note.style.left = `${nextX}px`;
            note.style.top = `${nextY}px`;
        }
        function getOpenSlot() { return noteSlots.find((slot) => !slot.dataset.noteId) || null; }
        function createStickyNote() {
            const slot = getOpenSlot();
            if (!slot) return;
            const noteId = `sticky-${++stickyCounter}`;
            const note = document.createElement("article");
            note.className = "sticky-note color-yellow";
            note.dataset.noteId = noteId;
            note.dataset.attachedSlot = slot.dataset.slotIndex;
            note.style.zIndex = String(20 + stickyCounter);
            note.innerHTML = `
                <div class="sticky-drag-zone" aria-hidden="true"></div>
                <button class="sticky-remove" type="button" aria-label="Remove sticky note">x</button>
                <textarea class="sticky-input" placeholder="Write your note..."></textarea>
            `;
            stickyLayer.appendChild(note);
            slot.dataset.noteId = noteId;
            positionNoteOnSlot(note, slot);
            note.classList.add("pop-in");
            note.addEventListener("animationend", () => note.classList.remove("pop-in"), { once: true });
            // Save note text live so users do not lose edits.
            const textarea = note.querySelector('.sticky-input');
            if (textarea) textarea.addEventListener('input', saveStickyNotes);
            saveStickyNotes();
            refreshAttachedNotes();
        }
        function positionNoteOnSlot(note, slot) {
            const slotRect = getSlotRect(slot);
            const layerOffset = getLayerPageOffset();
            // Calculate position in page coordinates so notes stay attached while scrolling.
            const x = slotRect.left + window.scrollX - layerOffset.left;
            const y = slotRect.top + window.scrollY - layerOffset.top;
            setClampedNotePosition(note, x, y);
        }
        function releaseSlotForNote(note) {
            const attachedSlotIndex = note.dataset.attachedSlot;
            if (attachedSlotIndex === undefined || attachedSlotIndex === "") return;
            const slot = noteSlots.find((item) => item.dataset.slotIndex === attachedSlotIndex);
            if (slot && slot.dataset.noteId === note.dataset.noteId) delete slot.dataset.noteId;
            delete note.dataset.attachedSlot;
        }
        // Snap dropped notes to the nearest available slot within a distance threshold.
        function maybeSnapToNearestSlot(note) {
            const noteRect = note.getBoundingClientRect();
            const noteCenterX = noteRect.left + noteRect.width / 2;
            const noteCenterY = noteRect.top + noteRect.height / 2;
            const threshold = Math.max(noteRect.width * 0.95, 110);
            let bestSlot = null;
            let bestDistance = Number.POSITIVE_INFINITY;
            for (const slot of noteSlots) {
                const occupiedByOther = slot.dataset.noteId && slot.dataset.noteId !== note.dataset.noteId;
                if (occupiedByOther) continue;
                const slotRect = getSlotRect(slot);
                const slotCenterX = slotRect.left + slotRect.width / 2;
                const slotCenterY = slotRect.top + slotRect.height / 2;
                const distance = Math.hypot(slotCenterX - noteCenterX, slotCenterY - noteCenterY);
                if (distance < bestDistance) {
                    bestDistance = distance;
                    bestSlot = slot;
                }
            }
            if (!bestSlot || bestDistance > threshold) return;
            releaseSlotForNote(note);
            bestSlot.dataset.noteId = note.dataset.noteId;
            note.dataset.attachedSlot = bestSlot.dataset.slotIndex;
            positionNoteOnSlot(note, bestSlot);
        }
        // Begin drag only from note chrome (not textarea/remove button).
        function onStickyPointerDown(event) {
            const note = event.target.closest(".sticky-note");
            if (!note) return;
            if (event.target.classList.contains("sticky-input") || event.target.classList.contains("sticky-remove")) return;
            const noteRect = note.getBoundingClientRect();
            note.style.zIndex = String(40 + stickyCounter++);
            activeDrag = {
                note,
                pointerId: event.pointerId,
                offsetX: event.clientX - noteRect.left,
                offsetY: event.clientY - noteRect.top
            };
            note.setPointerCapture(event.pointerId);
            releaseSlotForNote(note);
            note.classList.add("dragging");
            event.preventDefault();
        }
        // Track pointer movement in sticky-layer coordinates.
        function onStickyPointerMove(event) {
            if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;
            const layerOffset = getLayerPageOffset();
            const x = event.pageX - layerOffset.left - activeDrag.offsetX;
            const y = event.pageY - layerOffset.top - activeDrag.offsetY;
            setClampedNotePosition(activeDrag.note, x, y);
        }
        // End drag and attempt a nearest-slot snap.
        function onStickyPointerUp(event) {
            if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;
            const note = activeDrag.note;
            note.classList.remove("dragging");
            maybeSnapToNearestSlot(note);
            note.releasePointerCapture(event.pointerId);
            activeDrag = null;
            saveStickyNotes();
        }
        function removeStickyNote(note) {
            if (!note) return;
            if (activeDrag && activeDrag.note === note) activeDrag = null;
            releaseSlotForNote(note);
            note.remove();
            saveStickyNotes();
            refreshAttachedNotes();
        }
        function refreshAttachedNotes() {
            for (const slot of noteSlots) {
                if (!slot.dataset.noteId) continue;
                const note = stickyLayer.querySelector(`.sticky-note[data-note-id="${slot.dataset.noteId}"]`);
                if (!note) {
                    delete slot.dataset.noteId;
                    continue;
                }
                if (note.dataset.attachedSlot === slot.dataset.slotIndex) positionNoteOnSlot(note, slot);
            }
            for (const note of stickyLayer.querySelectorAll(".sticky-note")) {
                if (note.dataset.attachedSlot !== undefined && note.dataset.attachedSlot !== "") continue;
                const currentX = parseFloat(note.style.left || "0");
                const currentY = parseFloat(note.style.top || "0");
                setClampedNotePosition(note, currentX, currentY);
            }
        }

        // --- Firebase Auth & Firestore Sync ---
        function loadFromFirestore(uid) {
            if (firestoreUnsubscribe) firestoreUnsubscribe();
            firestoreUnsubscribe = db.collection("users").doc(uid).onSnapshot(doc => {
                if (!doc.exists) {
                    stickyLayer.querySelectorAll('.sticky-note').forEach(n => n.remove());
                    noteSlots.forEach(s => delete s.dataset.noteId);
                    stickyCounter = 0;
                    loadStickyNotes();
                    loadHistoryFromLocalStorage();
                    loadWhiteboardFromLocalStorage();
                    return;
                }
                const data = doc.data();
                if (Array.isArray(data.stickyNotes)) {
                    stickyLayer.querySelectorAll('.sticky-note').forEach(n => n.remove());
                    noteSlots.forEach(s => delete s.dataset.noteId);
                    stickyCounter = 0;
                    localStorage.setItem('stickyNotes', JSON.stringify(data.stickyNotes));
                    loadStickyNotes();
                }
                if (Array.isArray(data.calcHistory)) {
                    localStorage.setItem(CALC_HISTORY_STORAGE_KEY, JSON.stringify(data.calcHistory));
                    renderCalcHistory(data.calcHistory);
                }
                if (typeof data.whiteboardImage === "string") {
                    localStorage.setItem(WHITEBOARD_STORAGE_KEY, data.whiteboardImage);
                    drawWhiteboardFromDataUrl(data.whiteboardImage);
                }
            }, err => console.error("Firestore listener error:", err));
        }
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                headerAvatar.src = "profile.png";
                headerAvatar.title = user.displayName || "";
                authBtn.textContent = "Sign Out";
                stickyLayer.querySelectorAll('.sticky-note').forEach(n => n.remove());
                noteSlots.forEach(s => delete s.dataset.noteId);
                stickyCounter = 0;
                loadStickyNotes();
                loadHistoryFromLocalStorage();
                loadWhiteboardFromLocalStorage();
                loadFromFirestore(user.uid);
            } else {
                headerAvatar.src = "profile.png";
                headerAvatar.title = "";
                authBtn.textContent = "Sign In";
                if (firestoreUnsubscribe) { firestoreUnsubscribe(); firestoreUnsubscribe = null; }
                stickyLayer.querySelectorAll('.sticky-note').forEach(n => n.remove());
                noteSlots.forEach(s => delete s.dataset.noteId);
                stickyCounter = 0;
                historyList.innerHTML = "";
                fillBoardBackground();
                if (shouldReloadAfterSignOut) {
                    shouldReloadAfterSignOut = false;
                    window.location.reload();
                    return;
                }
            }
        });
        authBtn.addEventListener("click", () => {
            if (currentUser) {
                // Save in background, but do not block sign-out on network writes.
                writeStickyNotesToFirestoreNow().catch(err => {
                    console.error("Pre sign-out note save failed:", err);
                });
                localStorage.setItem(CALC_HISTORY_STORAGE_KEY, JSON.stringify(collectCalcHistory()));
                writeHistoryToFirestoreNow().catch(err => {
                    console.error("Pre sign-out history save failed:", err);
                });
                writeWhiteboardToFirestoreNow().catch(err => {
                    console.error("Pre sign-out whiteboard save failed:", err);
                });

                shouldReloadAfterSignOut = true;
                auth.signOut().catch(err => {
                    shouldReloadAfterSignOut = false;
                    console.error("Sign-out error:", err);
                });
            } else {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(err => console.error("Sign-in error:", err));
            }
        });

        // --- Calculator Logic ---
        // Append raw token text into the expression input.
        function appendValue(value) {
            expressionInput.value += value;
            expressionInput.focus();
        }
        function clearExpression() {
            expressionInput.value = "";
            resultOutput.textContent = "0";
        }
        function deleteLast() {
            expressionInput.value = expressionInput.value.slice(0, -1);
            expressionInput.focus();
        }
        function insertNegation() {
            const current = expressionInput.value;
            const lastChar = current.slice(-1);
            const canStartNegative = !current || /[+\-*/^(,]$/.test(current);

            expressionInput.value += canStartNegative ? "-" : "*(-1)";
            expressionInput.focus();
        }
        // Convert calculator-style tokens into math.js-safe syntax before evaluation.
        function normalizeExpression(rawExpression) {
            return rawExpression
                .replace(/EE/g, "e")
                .replace(/((?:\d+(?:\.\d+)?)|(?:ans|pi|e)|\))%/g, "($1/100)");
        }
        // Keep a compact, newest-first history list (up to 12 entries).
        function renderHistory(expression, result) {
            const item = createHistoryItem(expression, result);
            historyList.prepend(item);
            if (historyList.children.length > 12) historyList.removeChild(historyList.lastChild);
            saveHistoryToFirestore();
        }
        // Evaluate with math.js using scope variables/functions (e.g., ans, inv).
        function evaluateExpression() {
            const raw = expressionInput.value.trim();
            if (!raw) return;
            try {
                const normalizedExpression = normalizeExpression(raw);
                const evaluated = math.evaluate(normalizedExpression, scope);
                const result = typeof evaluated === "number" ? math.format(evaluated, { precision: 14 }) : String(evaluated);
                scope.ans = evaluated;
                resultOutput.textContent = result;
                renderHistory(raw, result);
                expressionInput.value = result;
            } catch (error) {
                resultOutput.textContent = "Invalid expression";
            }
        }

        // --- Whiteboard Logic ---
        // Reset drawing surface to a white background used by eraser mode.
        function fillBoardBackground() {
            ctx.save();
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.max(1, Math.floor(rect.width));
            canvas.height = Math.max(1, Math.floor(rect.height));
            fillBoardBackground();
        }
        // In line/shape modes we capture a canvas snapshot for live preview.
        function startDrawing(x, y) {
            if (lineMode || shapeMode) {
                lineStart = { x, y };
                lineSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
                drawing = true;
                return;
            }
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
        // Repaint from snapshot each move so only one preview shape is visible.
        function drawShapePreview(x, y) {
            ctx.putImageData(lineSnapshot, 0, 0);
            const lw = Number(penSize.value);
            ctx.lineWidth = lw;
            ctx.strokeStyle = penColor.value;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            if (shapeMode === 'circle') {
                const rx = (x - lineStart.x) / 2;
                const ry = (y - lineStart.y) / 2;
                const cx = lineStart.x + rx;
                const cy = lineStart.y + ry;
                ctx.ellipse(cx, cy, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
            } else if (shapeMode === 'square') {
                ctx.rect(lineStart.x, lineStart.y, x - lineStart.x, y - lineStart.y);
            } else if (shapeMode === 'triangle') {
                ctx.moveTo(lineStart.x + (x - lineStart.x) / 2, lineStart.y);
                ctx.lineTo(x, y);
                ctx.lineTo(lineStart.x, y);
                ctx.closePath();
            }
            ctx.stroke();
        }
        // Route pointer movement to line preview, shape preview, or freehand stroke.
        function drawTo(x, y) {
            if (!drawing) return;
            if (lineMode && lineStart) {
                ctx.putImageData(lineSnapshot, 0, 0);
                ctx.beginPath();
                ctx.lineCap = "round";
                ctx.lineWidth = Number(penSize.value);
                ctx.strokeStyle = penColor.value;
                ctx.moveTo(lineStart.x, lineStart.y);
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.closePath();
                return;
            }
            if (shapeMode && lineStart) {
                drawShapePreview(x, y);
                return;
            }
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.lineWidth = Number(penSize.value);
            ctx.strokeStyle = erasing ? "#ffffff" : penColor.value;
            ctx.lineTo(x, y);
            ctx.stroke();
        }
        function stopDrawing(event) {
            if (!drawing) return;
            if (shapeMode && lineStart && event) {
                const point = getPoint(event);
                drawShapePreview(point.x, point.y);
            }
            drawing = false;
            lineStart = null;
            lineSnapshot = null;
            ctx.closePath();
            saveWhiteboard();
        }
        function getPoint(event) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }

        // --- Event Listeners ---
        // Pointer events support mouse, touch, and pen with one input path.
        canvas.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            const point = getPoint(event);
            startDrawing(point.x, point.y);
        });
        canvas.addEventListener("pointermove", (event) => {
            event.preventDefault();
            const point = getPoint(event);
            drawTo(point.x, point.y);
        });
        canvas.addEventListener("pointerup", (event) => stopDrawing(event));
        canvas.addEventListener("pointerleave", (event) => stopDrawing(event));

        clearBoardBtn.addEventListener("click", () => {
            fillBoardBackground();
            saveWhiteboard();
        });
        // Ensure only one drawing mode is active at any given time.
        function deactivateAllTools() {
            erasing = false;
            lineMode = false;
            shapeMode = null;
            [eraserBtn, pencilBtn, lineBtn, circleBtn, squareBtn, triangleBtn].forEach(b => b.classList.remove("active"));
        }
        eraserBtn.addEventListener("click", () => {
            const wasActive = erasing;
            deactivateAllTools();
            erasing = !wasActive;
            eraserBtn.classList.toggle("active", erasing);
            if (!erasing) pencilBtn.classList.add("active");
        });
        pencilBtn.addEventListener("click", () => {
            deactivateAllTools();
            pencilBtn.classList.add("active");
        });
        lineBtn.addEventListener("click", () => {
            const wasActive = lineMode;
            deactivateAllTools();
            lineMode = !wasActive;
            lineBtn.classList.toggle("active", lineMode);
            if (!lineMode) pencilBtn.classList.add("active");
        });
        circleBtn.addEventListener("click", () => {
            const wasActive = shapeMode === 'circle';
            deactivateAllTools();
            shapeMode = wasActive ? null : 'circle';
            circleBtn.classList.toggle("active", shapeMode === 'circle');
            if (!shapeMode) pencilBtn.classList.add("active");
        });
        squareBtn.addEventListener("click", () => {
            const wasActive = shapeMode === 'square';
            deactivateAllTools();
            shapeMode = wasActive ? null : 'square';
            squareBtn.classList.toggle("active", shapeMode === 'square');
            if (!shapeMode) pencilBtn.classList.add("active");
        });
        triangleBtn.addEventListener("click", () => {
            const wasActive = shapeMode === 'triangle';
            deactivateAllTools();
            shapeMode = wasActive ? null : 'triangle';
            triangleBtn.classList.toggle("active", shapeMode === 'triangle');
            if (!shapeMode) pencilBtn.classList.add("active");
        });
        addStickyBtn.addEventListener("click", createStickyNote);
        historyList.addEventListener("click", (event) => {
            const removeButton = event.target.closest(".history-remove");
            if (!removeButton) return;
            const item = removeButton.closest("li");
            if (!item) return;
            item.remove();
            saveHistoryToFirestore();
        });
        stickyLayer.addEventListener("click", (event) => {
            const removeButton = event.target.closest(".sticky-remove");
            if (!removeButton) return;
            const note = removeButton.closest(".sticky-note");
            removeStickyNote(note);
        });
        stickyLayer.addEventListener("pointerdown", onStickyPointerDown);
        stickyLayer.addEventListener("pointermove", onStickyPointerMove);
        stickyLayer.addEventListener("pointerup", onStickyPointerUp);
        stickyLayer.addEventListener("pointercancel", onStickyPointerUp);
        window.addEventListener("resize", () => {
            syncStickyLayerBounds();
            resizeCanvas();
            if (currentUser) {
                loadWhiteboardFromLocalStorage();
            }
            refreshAttachedNotes();
        });
        window.addEventListener("scroll", syncStickyLayerBounds, { passive: true });
        const slotLayoutObserver = new ResizeObserver(() => {
            syncStickyLayerBounds();
            refreshAttachedNotes();
        });
        slotLayoutObserver.observe(noteSlots[0]?.parentElement || notesSpace);
        syncStickyLayerBounds();
        resizeCanvas();
        fillBoardBackground();
        // Handle all calculator button clicks via event delegation.
        keys.addEventListener("click", (event) => {
            const target = event.target;
            if (!(target instanceof HTMLButtonElement)) return;
            const action = target.dataset.action;
            const value = target.dataset.value;
            if (action === "clear") { clearExpression(); return; }
            if (action === "delete") { deleteLast(); return; }
            if (action === "evaluate") { evaluateExpression(); return; }
            if (action === "ans") { appendValue("ans"); return; }
            if (action === "ee") { appendValue("EE"); return; }
            if (action === "negate") { insertNegation(); return; }
            if (value) { appendValue(value); }
        });
        expressionInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                evaluateExpression();
            }
            if (event.key === "Escape") {
                clearExpression();
            }
        });
    </script>
</body>

</html>
