<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="shortcut icon" type="image/png" href="icon.png">
    <title>CalcuBee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="halo one" aria-hidden="true"></div>
    <div class="halo two" aria-hidden="true"></div>

    <header class="site-header" aria-label="Site header"></header>

    <main class="shell" aria-label="Calculator app">
        <aside class="history-panel panel">
            <h2>Recent Calculations</h2>
            <p>Your latest results stay here while you keep working.</p>
            <ul id="historyList" class="history-list" aria-label="Recent calculations"></ul>
        </aside>

        <section class="center-column" aria-label="Calculator and sticky notes">
            <section class="calculator panel" aria-labelledby="title">
                <div class="headline">
                    <h1 id="title">CalcuBee</h1>
                    <span class="tag">Advanced</span>
                </div>

                <div class="display">
                    <input id="expression" class="expression" type="text" inputmode="text"
                        placeholder="Type expression, for example sin(pi/4)^2 + 7!" aria-label="Expression input">
                    <div id="result" class="result" aria-live="polite">0</div>
                </div>

                <div class="grid" id="keys">
                    <button class="op" data-action="clear">AC</button>
                    <button class="op" data-action="delete">DEL</button>
                    <button class="op" data-value="(">(</button>
                    <button class="op" data-value=")">)</button>
                    <button class="op" data-value="%">%</button>
                    <button class="major" data-action="evaluate">=</button>

                    <button data-value="7">7</button>
                    <button data-value="8">8</button>
                    <button data-value="9">9</button>
                    <button class="op" data-value="/">/</button>
                    <button class="op" data-value="sqrt(">sqrt</button>
                    <button class="op" data-value="^">x^y</button>

                    <button data-value="4">4</button>
                    <button data-value="5">5</button>
                    <button data-value="6">6</button>
                    <button class="op" data-value="*">*</button>
                    <button class="op" data-value="sin(">sin</button>
                    <button class="op" data-value="cos(">cos</button>

                    <button data-value="1">1</button>
                    <button data-value="2">2</button>
                    <button data-value="3">3</button>
                    <button class="op" data-value="-">-</button>
                    <button class="op" data-value="tan(">tan</button>
                    <button class="op" data-value="abs(">abs</button>

                    <button class="wide" data-value="0">0</button>
                    <button data-value=".">.</button>
                    <button class="op" data-value="+">+</button>
                    <button class="op" data-value="log10(">log</button>
                    <button class="op" data-value="log(">ln</button>

                    <button class="op" data-value="pi">pi</button>
                    <button class="op" data-value="e">e</button>
                    <button class="op" data-value="!">n!</button>
                    <button class="op" data-value="inv(">1/x</button>
                    <button class="wide major" data-action="ans">Ans</button>
                </div>
            </section>

            <section class="notes-space panel" aria-label="Sticky notes area">
                <h2>Sticky Notes Space</h2>
                <p>This space is reserved below the calculator for your future sticky notes.</p>
            </section>
        </section>

        <aside class="board panel">
            <h2>Whiteboard</h2>
            <p>Sketch formulas or notes while you calculate.</p>

            <div class="tools" aria-label="Whiteboard tools">
                <label for="penColor">Color
                    <input id="penColor" type="color" value="#1d1b16" aria-label="Pen color">
                </label>
                <label for="penSize">Size
                    <input id="penSize" type="range" min="1" max="24" value="3" aria-label="Pen size">
                </label>
                <button id="eraserBtn" class="tool-btn" type="button">Eraser</button>
                <button id="clearBoard" class="tool-btn" type="button">Clear</button>
            </div>

            <div class="board-wrap">
                <canvas id="whiteboard" class="whiteboard" aria-label="Drawing whiteboard"></canvas>
            </div>
        </aside>

    </main>

    <footer class="site-footer" aria-label="Site footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/mathjs@12.4.2/lib/browser/math.js"></script>
    <script>
        const expressionInput = document.getElementById("expression");
        const resultOutput = document.getElementById("result");
        const keys = document.getElementById("keys");
        const canvas = document.getElementById("whiteboard");
        const clearBoardBtn = document.getElementById("clearBoard");
        const eraserBtn = document.getElementById("eraserBtn");
        const penColor = document.getElementById("penColor");
        const penSize = document.getElementById("penSize");
        const historyList = document.getElementById("historyList");
        const ctx = canvas.getContext("2d");

        const scope = {
            ans: 0,
            // Custom inverse helper to keep button labels intuitive.
            inv: (x) => 1 / x
        };

        function appendValue(value) {
            expressionInput.value += value;
            expressionInput.focus();
        }

        function clearExpression() {
            expressionInput.value = "";
            resultOutput.textContent = "0";
        }

        function deleteLast() {
            expressionInput.value = expressionInput.value.slice(0, -1);
            expressionInput.focus();
        }

        function renderHistory(expression, result) {
            const item = document.createElement("li");
            const exp = document.createElement("span");
            const res = document.createElement("span");

            exp.className = "item-exp";
            res.className = "item-res";
            exp.textContent = expression;
            res.textContent = result;

            item.appendChild(exp);
            item.appendChild(res);
            historyList.prepend(item);

            if (historyList.children.length > 12) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        function evaluateExpression() {
            const raw = expressionInput.value.trim();
            if (!raw) {
                return;
            }

            try {
                const evaluated = math.evaluate(raw, scope);
                const result = typeof evaluated === "number" ? math.format(evaluated, { precision: 14 }) : String(evaluated);

                scope.ans = evaluated;
                resultOutput.textContent = result;
                renderHistory(raw, result);
                expressionInput.value = result;
            } catch (error) {
                resultOutput.textContent = "Invalid expression";
            }
        }

        let drawing = false;
        let erasing = false;

        function fillBoardBackground() {
            ctx.save();
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.max(1, Math.floor(rect.width));
            canvas.height = Math.max(1, Math.floor(rect.height));
            fillBoardBackground();
        }

        function startDrawing(x, y) {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function drawTo(x, y) {
            if (!drawing) {
                return;
            }

            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.lineWidth = Number(penSize.value);
            ctx.strokeStyle = erasing ? "#ffffff" : penColor.value;
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function stopDrawing() {
            drawing = false;
            ctx.closePath();
        }

        function getPoint(event) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }

        canvas.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            const point = getPoint(event);
            startDrawing(point.x, point.y);
        });

        canvas.addEventListener("pointermove", (event) => {
            event.preventDefault();
            const point = getPoint(event);
            drawTo(point.x, point.y);
        });

        canvas.addEventListener("pointerup", stopDrawing);
        canvas.addEventListener("pointerleave", stopDrawing);

        clearBoardBtn.addEventListener("click", fillBoardBackground);

        eraserBtn.addEventListener("click", () => {
            erasing = !erasing;
            eraserBtn.classList.toggle("active", erasing);
        });

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        keys.addEventListener("click", (event) => {
            const target = event.target;
            if (!(target instanceof HTMLButtonElement)) {
                return;
            }

            const action = target.dataset.action;
            const value = target.dataset.value;

            if (action === "clear") {
                clearExpression();
                return;
            }

            if (action === "delete") {
                deleteLast();
                return;
            }

            if (action === "evaluate") {
                evaluateExpression();
                return;
            }

            if (action === "ans") {
                appendValue("ans");
                return;
            }

            if (value) {
                appendValue(value);
            }
        });

        expressionInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                evaluateExpression();
            }

            if (event.key === "Escape") {
                clearExpression();
            }
        });
    </script>
</body>

</html>
